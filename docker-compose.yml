services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SELF_HOST_POSTGRES_DB:-personal_running_coach}
      POSTGRES_USER: ${SELF_HOST_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SELF_HOST_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${SELF_HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SELF_HOST_POSTGRES_USER:-postgres} -d ${SELF_HOST_POSTGRES_DB:-personal_running_coach}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${SELF_HOST_POSTGRES_USER:-postgres}:${SELF_HOST_POSTGRES_PASSWORD:-postgres}@db:5432/${SELF_HOST_POSTGRES_DB:-personal_running_coach}
    depends_on:
      db:
        condition: service_healthy
    command: npm run db:migrate
    restart: "no"

  web:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${SELF_HOST_POSTGRES_USER:-postgres}:${SELF_HOST_POSTGRES_PASSWORD:-postgres}@db:5432/${SELF_HOST_POSTGRES_DB:-personal_running_coach}
      NEXT_PUBLIC_APP_URL: ${SELF_HOST_APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${SELF_HOST_APP_PORT:-3000}:3000"
    command:
      - sh
      - -c
      - npm run start --workspace @personal-running-coach/web -- --hostname 0.0.0.0 --port 3000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  worker:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${SELF_HOST_POSTGRES_USER:-postgres}:${SELF_HOST_POSTGRES_PASSWORD:-postgres}@db:5432/${SELF_HOST_POSTGRES_DB:-personal_running_coach}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      - npm
      - run
      - start
      - --workspace
      - '@personal-running-coach/worker'
    restart: unless-stopped

volumes:
  postgres_data:
